name: Build and publish Docker image

# Only build/publish on version tags (e.g. v1.2.3). Cut a release by pushing
# a matching tag: `git tag v1.2.3 && git push origin v1.2.3`.
on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image name
        # GHCR requires lowercase image names, but ${{ github.repository }}
        # preserves the original casing (e.g. larsborn/ZvgPortalScraper).
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # For a tag like `v1.2.3` this produces: `1.2.3`, `1.2`, `1`,
          # `latest`, plus a `sha-<short>` tag for traceability.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# One-time setup note:
# After the first successful publish, visit
# https://github.com/users/larsborn/packages/container/zvgportalscraper/settings
# to link the package to this repository (enables inherited access) and,
# if desired, set its visibility to public.
